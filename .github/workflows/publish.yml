name: Publish to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout pages repo
        uses: actions/checkout@v4
        with:
          repository: georgekouklakis/georgekouklakis.github.io
          token: ${{ secrets.GH_PAT }}
          path: pages-repo

      - name: Copy index.html
        run: |
          mkdir -p pages-repo/ganvas
          cp index.html pages-repo/ganvas/index.html

      - name: Commit and push
        run: |
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ganvas/index.html
          git diff --cached --quiet || git commit -m "Update ganvas from georgekouklakis/ganvas@${{ github.sha }}"
          git push
